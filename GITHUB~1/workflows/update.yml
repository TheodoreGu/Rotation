name: Update Hate Ledger data

on:
  workflow_dispatch:        # fire on demand from the Actions tab (works on phone)
  schedule:
    - cron: "30 21 * * 1-5" # weekdays ~1h after US close (21:30 UTC)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance
      - run: python fetch_data.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M')"
          git push
